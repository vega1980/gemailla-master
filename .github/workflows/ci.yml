name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  validate:
    runs-on: ubuntu-latest
    env:
      # Public Firebase client configuration. Repository variables may override
      # these CI-safe defaults without granting access to protected secrets.
      VITE_FIREBASE_API_KEY: ${{ vars.VITE_FIREBASE_API_KEY || 'test-firebase-api-key' }}
      VITE_FIREBASE_AUTH_DOMAIN: ${{ vars.VITE_FIREBASE_AUTH_DOMAIN || 'demo-gemailla-ci.firebaseapp.com' }}
      VITE_FIREBASE_PROJECT_ID: ${{ vars.VITE_FIREBASE_PROJECT_ID || 'demo-gemailla-ci' }}
      VITE_FIREBASE_STORAGE_BUCKET: ${{ vars.VITE_FIREBASE_STORAGE_BUCKET || 'demo-gemailla-ci.appspot.com' }}
      VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ vars.VITE_FIREBASE_MESSAGING_SENDER_ID || '1234567890' }}
      VITE_FIREBASE_APP_ID: ${{ vars.VITE_FIREBASE_APP_ID || '1:1234567890:web:ci' }}
      # CI validates shape/presence only. Protected deploy workflows should use
      # `${{ secrets.OPENAI_API_KEY }}` in backend/Firebase Functions steps.
      OPENAI_API_KEY: sk-test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate environment before build and deploy
        run: npm run validate:env:all

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
