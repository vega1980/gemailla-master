name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  validate:
    runs-on: ubuntu-latest
    env:
      # Public Firebase client configuration. Repository variables may override
      # these CI-safe defaults without granting access to protected secrets.
      VITE_FIREBASE_API_KEY: ${{ vars.VITE_FIREBASE_API_KEY || 'test-firebase-api-key' }}
      VITE_FIREBASE_AUTH_DOMAIN: ${{ vars.VITE_FIREBASE_AUTH_DOMAIN || 'demo-gemailla-ci.firebaseapp.com' }}
      VITE_FIREBASE_PROJECT_ID: ${{ vars.VITE_FIREBASE_PROJECT_ID || 'demo-gemailla-ci' }}
      VITE_FIREBASE_STORAGE_BUCKET: ${{ vars.VITE_FIREBASE_STORAGE_BUCKET || 'demo-gemailla-ci.appspot.com' }}
      VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ vars.VITE_FIREBASE_MESSAGING_SENDER_ID || '1234567890' }}
      VITE_FIREBASE_APP_ID: ${{ vars.VITE_FIREBASE_APP_ID || '1:1234567890:web:ci' }}
      # CI validates shape/presence only. Protected deploy workflows should use
      # `${{ secrets.OPENAI_API_KEY }}` in backend/Firebase Functions steps.
      OPENAI_API_KEY: sk-test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Functions dependencies
        run: npm --prefix functions ci

      - name: Validate environment before build and deploy
        run: npm run validate:env:all

      - name: Security Scan
        run: |
          # Bloquear VITE_* sensibles que contengan ENDPOINT, URL o KEY en el cliente.
          # VITE_FIREBASE_API_KEY es configuración pública de Firebase y se permite explícitamente.
          matches=$(rg -n --glob '*.{js,jsx}' 'VITE_.*(ENDPOINT|URL|KEY)' src || true)
          sensitive_matches=$(printf '%s\n' "$matches" | rg -v 'VITE_FIREBASE_API_KEY' || true)
          if [ -n "$sensitive_matches" ]; then
            printf '%s\n' "$sensitive_matches"
            echo "ERROR: Variables VITE_* sensibles detectadas en cliente"
            exit 1
          fi

      - name: Lint
        run: npm run lint

      - name: Typecheck core
        run: npm run typecheck:core

      - name: Unit tests
        run: npm run test:unit

      - name: Install Functions dependencies
        run: npm ci
        working-directory: functions

      - name: Functions tests
        run: npm run test:functions

      - name: Validate architecture
        run: npm run validate:architecture

      - name: Measure architecture baseline
        run: npm run measure:architecture

      - name: Validate secrets
        run: npm run validate:secrets

      - name: Build
        run: npm run build
