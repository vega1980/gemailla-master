name: Firebase Rules

on:
  pull_request:
    paths:
      - 'firestore.rules'
      - 'storage.rules'
      - 'firebase.json'
      - 'tests/rules/**'
      - 'package.json'
      - '.github/workflows/firebase-rules.yml'
  push:
    branches:
      - work
      - main
    paths:
      - 'firestore.rules'
      - 'storage.rules'
      - 'firebase.json'
      - 'tests/rules/**'
      - 'package.json'
      - '.github/workflows/firebase-rules.yml'

jobs:
  rules:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - name: Cache Firebase emulators
        uses: actions/cache@v4
        with:
          path: ~/.cache/firebase/emulators
          key: firebase-emulators-${{ runner.os }}-${{ hashFiles('package.json') }}
          restore-keys: |
            firebase-emulators-${{ runner.os }}-
      - name: Install dependencies
        run: npm install
      - name: Download Firebase emulators
        run: npm run test:rules:setup
      - name: Run Firebase rules tests
        run: npm run test:rules:emulators
