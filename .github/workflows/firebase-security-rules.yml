name: Firebase Security Rules

on:
  pull_request:
    paths:
      - firestore.rules
      - storage.rules
      - firebase.json
      - firestore.indexes.json
      - tests/rules/**
      - package.json
      - package-lock.json
      - .github/workflows/firebase-security-rules.yml
  push:
    branches: [main, master]
    paths:
      - firestore.rules
      - storage.rules
      - firebase.json
      - firestore.indexes.json
      - tests/rules/**
      - package.json
      - package-lock.json
      - .github/workflows/firebase-security-rules.yml
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate-and-deploy-rules:
    runs-on: ubuntu-latest
    env:
      FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
      FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Set up Java 21 for Firebase emulators
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - run: npm ci
      - name: Cache Firebase emulators
        uses: actions/cache@v4
        with:
          path: ~/.cache/firebase/emulators
          key: firebase-emulators-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            firebase-emulators-${{ runner.os }}-
      - name: Pre-download Firestore emulator
        run: npx firebase-tools setup:emulators:firestore
      - name: Run Firebase rules emulator tests
        run: npm run test:rules:emulators
      - name: Skip deployment for pull requests
        if: ${{ github.event_name == 'pull_request' }}
        run: echo "Pull request validation completed; Firebase rules are not deployed from pull requests."
      - name: Authenticate Firebase service account
        if: ${{ github.event_name != 'pull_request' && env.FIREBASE_PROJECT_ID != '' && env.FIREBASE_SERVICE_ACCOUNT_JSON != '' }}
        run: |
          printf '%s' "$FIREBASE_SERVICE_ACCOUNT_JSON" > "$RUNNER_TEMP/firebase-service-account.json"
          echo "GOOGLE_APPLICATION_CREDENTIALS=$RUNNER_TEMP/firebase-service-account.json" >> "$GITHUB_ENV"
      - name: Deploy Firestore and Storage rules
        if: ${{ github.event_name != 'pull_request' && env.FIREBASE_PROJECT_ID != '' && env.FIREBASE_SERVICE_ACCOUNT_JSON != '' }}
        run: npx firebase-tools deploy --only firestore:rules,storage --project "$FIREBASE_PROJECT_ID" --non-interactive
      - name: Fail deployment without Firebase secrets
        if: ${{ github.event_name != 'pull_request' && (env.FIREBASE_PROJECT_ID == '' || env.FIREBASE_SERVICE_ACCOUNT_JSON == '') }}
        run: |
          echo "FIREBASE_PROJECT_ID and FIREBASE_SERVICE_ACCOUNT are required to deploy Firebase rules on ${{ github.event_name }}."
          exit 1
