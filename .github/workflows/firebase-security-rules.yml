name: Firebase Security Rules

on:
  pull_request:
    paths:
      - firestore.rules
      - storage.rules
      - firebase.json
      - firestore.indexes.json
      - tests/rules/**
      - package.json
      - package-lock.json
      - .github/workflows/firebase-security-rules.yml
  push:
    branches: [main, master]
    paths:
      - firestore.rules
      - storage.rules
      - firebase.json
      - firestore.indexes.json
      - tests/rules/**
      - package.json
      - package-lock.json
      - .github/workflows/firebase-security-rules.yml
  workflow_dispatch:

permissions:
  contents: read

jobs:
  rules-emulators:
    name: Rules emulator tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - name: Cache Firebase emulators
        uses: actions/cache@v4
        with:
          path: ~/.cache/firebase/emulators
          key: firebase-emulators-${{ runner.os }}-${{ hashFiles('package-lock.json', 'firebase.json') }}
          restore-keys: |
            firebase-emulators-${{ runner.os }}-
      - run: npm ci
      - run: npm run test:rules:emulators

  deploy-rules:
    name: Deploy rules
    needs: rules-emulators
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'push' && (github.ref_name == 'main' || github.ref_name == 'master') }}
    env:
      FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
      FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Authenticate Firebase service account
        if: ${{ env.FIREBASE_PROJECT_ID != '' && env.FIREBASE_SERVICE_ACCOUNT_JSON != '' }}
        run: |
          printf '%s' "$FIREBASE_SERVICE_ACCOUNT_JSON" > "$RUNNER_TEMP/firebase-service-account.json"
          echo "GOOGLE_APPLICATION_CREDENTIALS=$RUNNER_TEMP/firebase-service-account.json" >> "$GITHUB_ENV"
      - name: Deploy Firestore and Storage rules
        if: ${{ env.FIREBASE_PROJECT_ID != '' && env.FIREBASE_SERVICE_ACCOUNT_JSON != '' }}
        run: npx firebase-tools deploy --only firestore:rules,storage --project "$FIREBASE_PROJECT_ID" --non-interactive
      - name: Skip deploy without Firebase secrets
        if: ${{ env.FIREBASE_PROJECT_ID == '' || env.FIREBASE_SERVICE_ACCOUNT_JSON == '' }}
        run: echo "Skipping Firebase rules deploy because FIREBASE_PROJECT_ID or FIREBASE_SERVICE_ACCOUNT is not configured."
